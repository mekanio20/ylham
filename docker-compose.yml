version: "3.9"

services:
  # ------------------------
  # Backend (Django)
  # ------------------------
  backend:
    container_name: ylham-backend
    build:
      context: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db

  # ------------------------
  # Frontend (Vue + Vite)
  # ------------------------
  frontend:
    container_name: ylham-frontend
    build:
      context: ./frontend
    command: yarn run dev --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend